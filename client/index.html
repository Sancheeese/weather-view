<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天气查询</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1 class="app-title">天气查询</h1>
        <p class="app-subtitle">输入城市名，查看实时天气</p>
      </header>

      <form class="search-form" id="search-form" autocomplete="off">
        <label class="search-label" for="city-input">城市</label>
        <div class="search-row">
          <input
            id="city-input"
            class="search-input"
            type="text"
            name="city"
            placeholder="例如：北京、Shanghai"
            maxlength="80"
          />
          <button class="search-btn" type="submit" id="search-btn">查询</button>
        </div>
      </form>

      <main class="weather-panel" id="weather-panel" aria-live="polite"></main>

      <footer class="app-footer">
        <p>数据来源 Open-Meteo · 仅供演示</p>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
